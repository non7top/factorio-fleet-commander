name: Build mod package

# Packages the mod into a Factorio-ready zip on every PR so reviewers can
# download it and drop it straight into their `mods` folder. The zip's
# internal folder is named "fleet-commander_<version>" using the exact
# version from info.json (no PR/build suffix), so repeated downloads of
# the same version simply overwrite the previous copy on disk.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read mod name/version from info.json
        id: meta
        run: |
          echo "name=$(jq -r .name info.json)" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r .version info.json)" >> "$GITHUB_OUTPUT"

      - name: Assemble versioned mod folder
        env:
          FOLDER: ${{ steps.meta.outputs.name }}_${{ steps.meta.outputs.version }}
        run: |
          mkdir -p "build/$FOLDER"
          # Only ship files Factorio actually needs to load the mod --
          # skip repo scaffolding (README, LICENSE, plan notes, CI config).
          cp -r info.json control.lua "build/$FOLDER/"
          [ -d locale ] && cp -r locale "build/$FOLDER/"
          [ -d graphics ] && cp -r graphics "build/$FOLDER/"

      - name: Zip mod package
        env:
          FOLDER: ${{ steps.meta.outputs.name }}_${{ steps.meta.outputs.version }}
        run: |
          cd build
          zip -r -9 "../$FOLDER.zip" "$FOLDER"

      # The zip above is already compressed; ask upload-artifact not to
      # re-compress it a second time when it wraps the artifact for
      # download (compression-level 0 = store only).
      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.name }}_${{ steps.meta.outputs.version }}
          path: ${{ steps.meta.outputs.name }}_${{ steps.meta.outputs.version }}.zip
          compression-level: 0
          if-no-files-found: error

      - name: Comment PR with download link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const name = "${{ steps.meta.outputs.name }}";
            const version = "${{ steps.meta.outputs.version }}";
            const runId = context.runId;
            const artifactId = "${{ steps.upload.outputs.artifact-id }}";
            const url = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}/artifacts/${artifactId}`;
            const marker = "<!-- fleet-commander-build-comment -->";
            const body = `${marker}\n📦 Mod package built: **${name}_${version}.zip**\n\n[Download the mod zip](${url})\n\nUnzip and drop the \`${name}_${version}\` folder straight into your Factorio \`mods\` folder — same version number, so it simply overwrites any previous copy.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
